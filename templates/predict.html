<style>
body{
    font-family:'Poppins',sans-serif;
    background:#f4f9ff;
    overflow-x:hidden;
}

/* ================= LAYOUT ================= */
.main-wrapper{
    display:flex;
    min-height:100vh;
    padding-top: 90px;
}

/* ================= SIDEBAR ================= */


.sidebar{
    width:260px;
    padding:30px 18px;
    min-height:100vh;
    background: linear-gradient(180deg,#0077ff,#00c6ff);
    backdrop-filter: blur(12px);
    border-right:2px solid rgba(255,255,255,0.2);
    box-shadow:6px 0 30px rgba(0,0,0,0.2);
}

/* Sidebar links */
.sidebar a{
    display:flex;
    align-items:center;
    gap:12px;
    padding:14px 22px;
    margin-bottom:15px;
    border-radius:50px;
    background: rgba(255,255,255,0.15);
    text-decoration:none;
    color:#fff;
    font-weight:600;
    transition:0.4s;
    position:relative;
    overflow:hidden;
}

/* glowing line */
.sidebar a::before{
    content:"";
    position:absolute;
    left:-100%;
    top:0;
    width:100%;
    height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
    transition:0.6s;
}

.sidebar a:hover::before{
    left:100%;
}

.sidebar a:hover{
    background:#fff;
    color:#0077ff;
    transform:translateX(10px);
    box-shadow:0 12px 30px rgba(0,0,0,0.25);
}

/* active link */
.sidebar a.active{
    background:#fff;
    color:#0077ff;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* icons */
.sidebar a i{
    font-size:18px;
}



/* ================= CONTENT ================= */
.content-area{
    flex:1;
    padding:40px;
}

/* Header breadcrumb */
.bg-breadcrumb {
    border-radius: 25px;
    overflow: hidden;
    margin-bottom: 25px;
    height: 160px;              /* REDUCED HEIGHT */
    display: flex;
    align-items: center;        /* vertical center */
}

.compact-breadcrumb {
    padding: 0;
    line-height: 1.2;
    text-align: center;
}

.compact-breadcrumb h3 {
    font-size: 2.9rem;   /* BIGGER TEXT */
    margin-bottom: 6px;
    font-weight: 700;
    letter-spacing: 1px;
    
}
.compact-breadcrumb .breadcrumb {
    margin: 0;
    padding: 0;
    background: transparent;
    font-size: 1.5rem;
}

.compact-breadcrumb .breadcrumb-item a {
    color: #fff;
    font-size: 1rem;
}

/* ================= SERVICE CARDS ================= */
.service-card{
    background:rgba(255,255,255,0.9);
    padding:35px 25px;
    border-radius:30px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,0.1);
    transition:0.5s;
    height:100%;
    position:relative;
    overflow:hidden;
}

/* glowing border */
.service-card::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:30px;
    padding:2px;
    background:linear-gradient(120deg,#0077ff,#00ffff,#0077ff);
    -webkit-mask:
      linear-gradient(#fff 0 0) content-box,
      linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor;
}

/* icon */
.service-card i{
    font-size:55px;
    color:#0077ff;
    margin-bottom:15px;
    transition:0.4s;
}

.service-card h5{
    font-weight:700;
    margin-top:10px;
}

.service-card ul{
    list-style:none;
    padding:0;
    margin-top:12px;
}

.service-card ul li{
    font-size:0.9rem;
    color:#444;
    margin:5px 0;
}

/* hover effect */
.service-card:hover{
    transform:translateY(-15px) scale(1.05);
    box-shadow:0 30px 60px rgba(0,123,255,0.35);
}

.service-card:hover i{
    transform:rotate(10deg) scale(1.2);
    color:#00c6ff;
}

/* Responsive */
@media(max-width:991px){
    .main-wrapper{
        flex-direction:column;
    }
    .sidebar{
        width:100%;
        min-height:auto;
        display:flex;
        justify-content:space-around;
    }
    .sidebar a{
        margin-bottom:0;
        flex:1;
        justify-content:center;
    }
    .content-area{
        padding:20px;
    }
}
.service-btn{
    display:inline-block;
    margin-top:18px;
    padding:10px 28px;
    border-radius:30px;
    text-decoration:none;
    font-weight:600;
    color:#fff;
    background:linear-gradient(135deg,#0077ff,#00c6ff);
    box-shadow:0 10px 25px rgba(0,123,255,0.4);
    transition:0.4s;
    position:relative;
    overflow:hidden;
}

.service-btn::after{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.5);
    transform:skewX(-30deg);
    transition:0.6s;
}

.service-btn:hover::after{
    left:120%;
}

.service-btn:hover{
    transform:translateY(-4px) scale(1.08);
    box-shadow:0 15px 35px rgba(0,123,255,0.7);
}
.content-area{flex:1;padding:40px}
.card-glass{background:#fff;border-radius:25px;box-shadow:0 15px 40px rgba(0,0,0,0.1)}
/* ===== Compact Predict Table ===== */
.compact-form .form-control,
.compact-form select{
    border-radius:12px;
    padding:6px 10px;
    font-size:0.9rem;
}

.compact-form label{
    font-size:0.85rem;
    font-weight:600;
    margin-bottom:3px;
}

.compact-form .row > div{
    margin-bottom:10px;
}

.compact-form hr{
    margin:10px 0;
}

.compact-form h5{
    font-size:1rem;
    margin-bottom:8px;
}
</style>
</head>

<div class="container-fluid bg-breadcrumb">
    <div class="container text-center compact-breadcrumb">
        <h3 class="text-white">Predict Your BrainAge</h3>
        <ol class="breadcrumb justify-content-center">
            <li class="breadcrumb-item"><a href="#">Home</a></li>

<div class="row justify-content-center">

</div>

</select>

</div>

<hr>
<h5 class="text-primary">Symptoms</h5>

<option>Mild</option>

<option>Severe</option>
</select>
</div>

<div class="col-md-6">
<label>Frequent Headache</label>
<select name="headache" class="form-control">
<option>No</option>
<option>Occasional</option>
<option>Frequent</option>
</select>
</div>
</div>

<div class="row">
<div class="col-md-6">
<label>Sleep Issues</label>
<select name="sleep_issues" class="form-control">
<option>No</option>
<option>Yes</option>
</select>
</div>

<div class="col-md-6">
<label>Family History</label>
<select name="family_history" class="form-control">
<option>No</option>
<option>Yes</option>
</select>
</div>
</div>

<div class="row">
<div class="col-md-6">
<label>Lifestyle</label>
<select name="lifestyle" class="form-control">
<option>Healthy</option>
<option>Moderate</option>
<option>Sedentary</option>
</select>
</div>
</div>

<hr>

<div class="row">
<div class="col-md-6">
<label>MRI Volume (.img)</label>
<input type="file" name="mri_img" class="form-control" accept=".img" required>
</div>

<div class="col-md-6">
<label>MRI Header (.hdr)</label>
<input type="file" name="mri_hdr" class="form-control" accept=".hdr" required>
</div>
