<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="utf-8">
<title>{{ title }}</title>
<meta content="width=device-width, initial-scale=1.0" name="viewport">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css"/>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Libraries Stylesheet -->
<link href="../static/assets/lib/animate/animate.min.css" rel="stylesheet">
<link href="../static/assets/lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">

<!-- Customized Bootstrap Stylesheet -->
<link href="../static/assets/css/bootstrap.min.css" rel="stylesheet">

<!-- Template Stylesheet -->
<link href="../static/assets/css/style.css" rel="stylesheet">

<style>
body{
    font-family:'Poppins',sans-serif;
    background:#f4f9ff;
    overflow-x:hidden;
}

/* ================= LAYOUT ================= */
.main-wrapper{
    display:flex;
    min-height:100vh;
    padding-top: 90px;
}

/* ================= SIDEBAR ================= */
.sidebar{
    width:260px;
    padding:30px 18px;
    min-height:100vh;
    background: linear-gradient(180deg,#0077ff,#00c6ff);
    backdrop-filter: blur(12px);
    border-right:2px solid rgba(255,255,255,0.2);
    box-shadow:6px 0 30px rgba(0,0,0,0.2);
}

.sidebar a{
    display:flex;
    align-items:center;
    gap:12px;
    padding:14px 22px;
    margin-bottom:15px;
    border-radius:50px;
    background: rgba(255,255,255,0.15);
    text-decoration:none;
    color:#fff;
    font-weight:600;
    transition:0.4s;
    position:relative;
    overflow:hidden;
}

.sidebar a:hover{
    background:#fff;
    color:#0077ff;
    transform:translateX(10px);
    box-shadow:0 12px 30px rgba(0,0,0,0.25);
}

.sidebar a.active{
    background:#fff;
    color:#0077ff;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.content-area{
    flex:1;
    padding:40px;
}

/* Header breadcrumb */
.bg-breadcrumb {
    border-radius: 25px;
    overflow: hidden;
    margin-bottom: 25px;
    height: 160px;
    display: flex;
    align-items: center;
}

.compact-breadcrumb h3 {
    font-size: 2.9rem;
    margin-bottom: 6px;
    font-weight: 700;
}

.card-glass{
    background:rgba(255,255,255,0.9);
    border-radius:25px;
    box-shadow:0 15px 40px rgba(0,0,0,0.1);
}

/* Graph Cards */

.graph-card{
    background:#fff;
    border-radius:16px;
    padding:12px;
    box-shadow:0 8px 18px rgba(0,0,0,0.12);
    text-align:center;
}
.graph-card img{
    width:100%;
    height:auto;
    max-height:280px;
    object-fit:contain;
}
</style>
</head>

<body>

<!-- ================= TOPBAR ================= -->
<div class="container-fluid bg-dark px-5 d-none d-lg-block">
<div class="row gx-0 align-items-center" style="height: 45px;">
    <div class="col-lg-8 text-center text-lg-start mb-lg-0">
        <div class="d-flex flex-wrap">
            <a href="#" class="text-light me-4"><i class="fas fa-map-marker-alt text-primary me-2"></i>Find A Location</a>
            <a href="#" class="text-light me-4"><i class="fas fa-phone-alt text-primary me-2"></i>+01234567890</a>
            <a href="#" class="text-light me-0"><i class="fas fa-envelope text-primary me-2"></i>Example@gmail.com</a>
        </div>
    </div>
    <div class="col-lg-4 text-center text-lg-end">
        <div class="d-flex align-items-center justify-content-end">
            <a href="#" class="btn btn-light btn-square border rounded-circle nav-fill me-3"><i class="fab fa-facebook-f"></i></a>
            <a href="#" class="btn btn-light btn-square border rounded-circle nav-fill me-3"><i class="fab fa-twitter"></i></a>
            <a href="#" class="btn btn-light btn-square border rounded-circle nav-fill me-3"><i class="fab fa-instagram"></i></a>
            <a href="#" class="btn btn-light btn-square border rounded-circle nav-fill me-0"><i class="fab fa-linkedin-in"></i></a>
        </div>
    </div>
</div>
</div>

<!-- ================= NAVBAR ================= -->
<div class="container-fluid position-relative p-0">
<nav class="navbar navbar-expand-lg navbar-light bg-white px-4 px-lg-5 py-3 py-lg-0">
    <a href="#" class="navbar-brand p-0">
        <h1 class="text-primary m-0"><i class="fas fa-brain me-3"></i>NeuroAge</h1>
    </a>
    <div class="collapse navbar-collapse">
        <div class="navbar-nav ms-auto py-0">
            <a href="#" class="nav-item nav-link">Home</a>
            <a href="/admin_login" class="nav-item nav-link active">Admin</a>
            <a href="/patient_login" class="nav-item nav-link">Patient</a>
            <a href="/doctor_login" class="nav-item nav-link">Doctor</a>
        </div>
    </div>
</nav>
</div>

<!-- ================= BODY ================= -->
<div class="main-wrapper">

<!-- SIDEBAR -->
<div class="sidebar">
    <a href="/admin_dashboard"><i class="fas fa-home"></i>Dashboard</a>
    <a href="#"><i class="fas fa-users"></i>View Users</a>
    <a href="#" class="active"><i class="fas fa-brain"></i>Classify</a>
    <a href="/logout"><i class="fas fa-sign-out-alt"></i>Logout</a>
</div>

<!-- CONTENT -->
<div class="content-area">

<div class="container-fluid bg-breadcrumb">
    <div class="container text-center compact-breadcrumb">
        <h3 class="text-white">{{ title }}</h3>
        <ol class="breadcrumb justify-content-center">
            <li class="breadcrumb-item"><a href="#">Home</a></li>
            <li class="breadcrumb-item active text-primary">{{ title }}</li>
        </ol>
    </div>
</div>

<h2 class="mb-4 text-center fw-bold">
    <i class="fas fa-chart-line text-primary"></i> {{ title }}
</h2>

<p class="text-muted text-center mb-4">
    Classification training metrics: loss, accuracy, and dataset distribution.
</p>

<div class="card-glass p-4">

    <div class="row">
        {% for graph in graphs %}
        <div class="col-lg-6 col-md-6 col-sm-12 mb-3">
            <div class="graph-card">
                <img src="data:image/png;base64,{{ graph }}" alt="Graph">
            </div>
        </div>
        {% endfor %}
    </div>

</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../static/assets/js/main.js"></script>

</body>
</html>
