<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NeuroAge - MRI Processing</title>
<meta content="width=device-width, initial-scale=1.0" name="viewport">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="../static/assets/css/bootstrap.min.css" rel="stylesheet">
<link href="../static/assets/css/style.css" rel="stylesheet">

<style>
body{
    font-family:'Poppins',sans-serif;
    background:#f4f9ff;
    overflow-x:hidden;
}
.main-wrapper{display:flex;min-height:100vh;padding-top:90px}
.sidebar{
    width:260px;padding:30px 18px;min-height:100vh;
    background:linear-gradient(180deg,#0077ff,#00c6ff);
    backdrop-filter:blur(12px);
    border-right:2px solid rgba(255,255,255,0.2);
    box-shadow:6px 0 30px rgba(0,0,0,0.2);
}
.sidebar a{
    display:flex;align-items:center;gap:12px;
    padding:14px 22px;margin-bottom:15px;
    border-radius:50px;
    background:rgba(255,255,255,0.15);
    text-decoration:none;color:#fff;font-weight:600;
    transition:0.4s;
}
.sidebar a:hover{background:#fff;color:#0077ff;transform:translateX(10px)}
.sidebar a.active{background:#fff;color:#0077ff}
.content-area{flex:1;padding:40px}
.bg-breadcrumb{border-radius:25px;overflow:hidden;margin-bottom:25px;height:160px;display:flex;align-items:center}
.compact-breadcrumb h3{font-size:2.9rem;font-weight:700}
.card-glass{background:#fff;border-radius:25px;box-shadow:0 15px 40px rgba(0,0,0,0.1)}
.preview-img{
    width:300px;height:300px;object-fit:contain;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="container-fluid bg-dark px-5 d-none d-lg-block">
<div class="row gx-0 align-items-center" style="height:45px;">
<div class="col-lg-8 text-center text-lg-start">
<a href="#" class="text-light me-4"><i class="fas fa-map-marker-alt text-primary me-2"></i>Find A Location</a>
<a href="#" class="text-light me-4"><i class="fas fa-phone-alt text-primary me-2"></i>+01234567890</a>
<a href="#" class="text-light me-0"><i class="fas fa-envelope text-primary me-2"></i>Example@gmail.com</a>
</div>
</div>
</div>

<!-- NAVBAR -->
<div class="container-fluid position-relative p-0">
<nav class="navbar navbar-expand-lg navbar-light bg-white px-4 px-lg-5 py-3 py-lg-0">
<a href="#" class="navbar-brand p-0">
<h1 class="text-primary m-0"><i class="fas fa-brain me-3"></i>NeuroAge</h1>
</a>
<div class="collapse navbar-collapse">
<div class="navbar-nav ms-auto py-0">
<a href="#" class="nav-item nav-link">Home</a>
<a href="/admin_login" class="nav-item nav-link">Admin</a>
<a href="/patient_login" class="nav-item nav-link active">Patient</a>
<a href="/doctor_login" class="nav-item nav-link">Doctor</a>
</div>
</div>
</nav>
</div>

<!-- MAIN -->
<div class="main-wrapper">

<!-- SIDEBAR -->
<div class="sidebar">
<a href="/patient_dashboard"><i class="fas fa-user"></i> Patient Dashboard</a>
<a href="/view_predictions"><i class="fas fa-eye"></i> View Predictions</a>
<a href="/predict" class="active"><i class="fas fa-brain"></i> Predict Brain Age</a>
<a href="/logout"><i class="fas fa-sign-out-alt"></i> logout</a>
</div>

<!-- CONTENT -->
<div class="content-area">

<div class="container-fluid bg-breadcrumb">
<div class="container text-center compact-breadcrumb">
<h3 class="text-white">MRI Processing</h3>
<ol class="breadcrumb justify-content-center">
<li class="breadcrumb-item"><a href="#">Home</a></li>
<li class="breadcrumb-item active text-primary">Processing</li>
</ol>
</div>
</div>

<div class="row justify-content-center">
<div class="col-md-7">

<div class="card-glass p-4 text-center">

<h4 id="stepTitle" class="text-primary mb-3">Original MRI</h4>

<img id="stepImage" class="preview-img"
src="{{ url_for('static', filename=steps['original'].replace('static/','')) }}">

<p class="mt-3 text-muted">Processing MRI… please wait</p>

</div>

</div>
</div>

</div>
</div>

<script>
const steps = [
 {name:"Original MRI", img:"{{ url_for('static', filename=steps['original'].replace('static/','')) }}"},
 {name:"Binarization", img:"{{ url_for('static', filename=steps['binary'].replace('static/','')) }}"},
 {name:"Segmentation", img:"{{ url_for('static', filename=steps['segmented'].replace('static/','')) }}"},
 {name:"Feature Extraction", img:"{{ url_for('static', filename=steps['features'].replace('static/','')) }}"}
];

let index = 0;

setInterval(()=>{
 index++;
 if(index < steps.length){
   document.getElementById("stepTitle").innerText = steps[index].name;
   document.getElementById("stepImage").src = steps[index].img;
 } else {
   window.location.href = "/show_result/{{ prediction_id }}";
 }
},5000);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
